<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <div class="card">
      <h1>Crear cuenta</h1>
      <p class="subtitle">Completa los campos para registrarte</p>

      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
        <span class="error" id="error-nombre"></span>
      </div>

      <div class="form-group">
        <label for="correo">Correo electrónico</label>
        <input type="text" id="correo" placeholder="Ej: juan@correo.com" />
        <span class="error" id="error-correo"></span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" />
        <span class="error" id="error-password"></span>
      </div>

      <button onclick="validarFormulario()">Registrarse</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
